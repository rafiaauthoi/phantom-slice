<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gesture Slice Game</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <style>
    body {
      background-color: #050505;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
      margin: 0;
    }

    h1 {
      color: #ff2fb0;
      text-shadow: 0 0 12px #ff2fb0;
      letter-spacing: 2px;
    }

    #name-gate {
      max-width: 400px;
      margin: 40px auto 0;
      padding: 24px;
      border: 2px solid #ff2fb0;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255, 47, 176, 0.3);
    }

    #name-gate p {
      color: #7fffd4;
      font-size: 14px;
      margin-bottom: 16px;
    }

    #nameInput {
      width: 80%;
      background-color: #0a0a0a;
      border: 2px solid #7fffd4;
      color: #eaeaea;
      font-family: monospace;
      font-size: 16px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 16px;
    }

    #enterButton, #changePlayerButton, #playAgainButton {
      background-color: #ff2fb0;
      color: #0a0a0a;
      border: none;
      padding: 12px 24px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
    }

    #enterButton:hover, #changePlayerButton:hover, #playAgainButton:hover {
      background-color: #ff5fc4;
    }

    #main-content {
      display: none;
    }

    #player-bar {
      margin-top: 12px;
      font-size: 14px;
      color: #7fffd4;
    }

    #changePlayerButton {
      margin-top: 10px;
      padding: 6px 16px;
      font-size: 12px;
    }

    #main-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    #video-wrapper {
      position: relative;
      width: 65vw;
      max-width: 950px;
      aspect-ratio: 4 / 3;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 47, 176, 0.4);
      background-color: #000;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      opacity: 0.55;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(5, 5, 5, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #game-over-overlay.visible {
      display: flex;
    }

    #game-over-overlay h2 {
      color: #ff2fb0;
      text-shadow: 0 0 14px #ff2fb0;
      font-size: 28px;
      margin-bottom: 6px;
    }

    #game-over-overlay p {
      color: #7fffd4;
      font-size: 16px;
      margin: 4px 0;
    }

    #leaderboard {
      width: 220px;
      border: 2px solid #7fffd4;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(127, 255, 212, 0.3);
      text-align: left;
    }

    #leaderboard h2 {
      color: #7fffd4;
      font-size: 14px;
      letter-spacing: 1px;
      margin: 0 0 12px 0;
      text-align: center;
    }

    #resetLeaderboardButton {
      display: block;
      margin: 14px auto 0;
      background-color: transparent;
      color: #ff2fb0;
      border: 1px solid #ff2fb0;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }

    #resetLeaderboardButton:hover {
      background-color: rgba(255, 47, 176, 0.15);
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(127, 255, 212, 0.15);
    }

    .leaderboard-row.current-player {
      color: #ffe64d;
      font-weight: bold;
    }

    .leaderboard-empty {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>GESTURE SLICE</h1>

  <div id="name-gate">
    <p>Enter your name to start playing</p>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="16" />
    <button id="enterButton">Let's Play</button>
  </div>

  <div id="main-content">
    <div id="player-bar">
      Playing as: <span id="currentPlayerLabel">-</span>
      <br />
      <button id="changePlayerButton">Change Player</button>
    </div>

    <div id="main-row">
      <div id="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay" width="1280" height="960"></canvas>
        <div id="game-over-overlay">
          <h2>GAME OVER</h2>
          <p id="finalScoreText">Score: 0</p>
          <p id="newHighScoreText" style="color: #ffe64d; display: none;">NEW HIGH SCORE</p>
          <button id="playAgainButton" style="margin-top: 16px;">Play Again</button>
        </div>
      </div>

      <div id="leaderboard">
        <h2>TOP SCORES</h2>
        <div id="leaderboard-list"></div>
        <button id="resetLeaderboardButton">Reset Leaderboard</button>
      </div>
    </div>

    <p id="status">Loading tracking model...</p>
  </div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const nameGate = document.getElementById('name-gate');
    const mainContent = document.getElementById('main-content');
    const nameInput = document.getElementById('nameInput');
    const enterButton = document.getElementById('enterButton');
    const changePlayerButton = document.getElementById('changePlayerButton');
    const currentPlayerLabel = document.getElementById('currentPlayerLabel');
    const leaderboardList = document.getElementById('leaderboard-list');
    const resetLeaderboardButton = document.getElementById('resetLeaderboardButton');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const finalScoreText = document.getElementById('finalScoreText');
    const newHighScoreText = document.getElementById('newHighScoreText');
    const playAgainButton = document.getElementById('playAgainButton');

    const LEADERBOARD_KEY = 'gesture-slice-game-leaderboard';
    const LEADERBOARD_MAX_ENTRIES = 8;
    const GRAVITY = 0.35;
    const STARTING_LIVES = 3;
    const SPAWN_INTERVAL_MS = 1050;
    const BOMB_CHANCE = 0.18;
    const COMBO_TIMEOUT_MS = 500;
    const TRAIL_LENGTH = 25;
    const FRUIT_SLICE_BUFFER = 26;
    const BOMB_SLICE_BUFFER = 8;

    const SPRITE_PATHS = {
      melon: 'assets/fruits/melon.png',
      orange: 'assets/fruits/orange.png',
      peach: 'assets/fruits/peach.png',
      dragonfruit: 'assets/fruits/dragonfruit.png',
      grape: 'assets/fruits/grape.png',
      papaya: 'assets/fruits/papaya.png',
      pineapple: 'assets/fruits/pineapple.png',
      banana: 'assets/fruits/banana.png',
      berry: 'assets/fruits/berry.png',
      coconut: 'assets/fruits/coconut.png',
      cherry: 'assets/fruits/cherry.png',
      lemon_lime: 'assets/fruits/lemon_lime.png',
      watermelon: 'assets/fruits/watermelon.png',
      apple: 'assets/fruits/apple.png',
      blueberry: 'assets/fruits/blueberry.png',
      kiwi: 'assets/fruits/kiwi.png',
      pear: 'assets/fruits/pear.png',
      strawberry: 'assets/fruits/strawberry.png'
    };

    const loadedImages = {};

    function preloadSprites() {
      const promises = Object.entries(SPRITE_PATHS).map(([key, path]) => {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            loadedImages[key] = img;
            resolve();
          };
          img.onerror = () => {
            console.warn('Sprite missing, using fallback shape:', path);
            loadedImages[key] = null;
            resolve();
          };
          img.src = path;
        });
      });
      return Promise.all(promises);
    }

    const FRUIT_TYPES = [
      { name: 'melon', spriteKey: 'melon', radius: 58, glow: 'rgba(255, 179, 71, 0.85)', fallbackColor: '#ffb347', points: 20 },
      { name: 'orange', spriteKey: 'orange', radius: 48, glow: 'rgba(255, 157, 47, 0.85)', fallbackColor: '#ff9d2f', points: 10 },
      { name: 'peach', spriteKey: 'peach', radius: 46, glow: 'rgba(255, 185, 151, 0.85)', fallbackColor: '#ffb997', points: 10 },
      { name: 'dragonfruit', spriteKey: 'dragonfruit', radius: 50, glow: 'rgba(255, 47, 176, 0.85)', fallbackColor: '#ff2fb0', points: 12 },
      { name: 'grape', spriteKey: 'grape', radius: 36, glow: 'rgba(155, 93, 229, 0.85)', fallbackColor: '#9b5de5', points: 15 },
      { name: 'papaya', spriteKey: 'papaya', radius: 48, glow: 'rgba(255, 127, 80, 0.85)', fallbackColor: '#ff7f50', points: 20 },
      { name: 'pineapple', spriteKey: 'pineapple', radius: 58, glow: 'rgba(255, 230, 77, 0.85)', fallbackColor: '#ffe64d', points: 20 },
      { name: 'banana', spriteKey: 'banana', radius: 50, glow: 'rgba(255, 230, 77, 0.85)', fallbackColor: '#ffe64d', points: 10 },
      { name: 'berry', spriteKey: 'berry', radius: 36, glow: 'rgba(194, 24, 91, 0.85)', fallbackColor: '#c2185b', points: 15 },
      { name: 'coconut', spriteKey: 'coconut', radius: 56, glow: 'rgba(210, 180, 140, 0.85)', fallbackColor: '#d2b48c', points: 20 },
      { name: 'cherry', spriteKey: 'cherry', radius: 36, glow: 'rgba(255, 47, 77, 0.85)', fallbackColor: '#ff2f4d', points: 15 },
      { name: 'lemon_lime', spriteKey: 'lemon_lime', radius: 44, glow: 'rgba(198, 255, 47, 0.85)', fallbackColor: '#c6ff2f', points: 10 },
      { name: 'watermelon', spriteKey: 'watermelon', radius: 60, glow: 'rgba(61, 220, 132, 0.85)', fallbackColor: '#3ddc84', points: 20 },
      { name: 'apple', spriteKey: 'apple', radius: 46, glow: 'rgba(61, 220, 132, 0.85)', fallbackColor: '#3ddc84', points: 10 },
      { name: 'blueberry', spriteKey: 'blueberry', radius: 34, glow: 'rgba(77, 121, 255, 0.85)', fallbackColor: '#4d79ff', points: 15 },
      { name: 'kiwi', spriteKey: 'kiwi', radius: 40, glow: 'rgba(139, 195, 74, 0.85)', fallbackColor: '#8bc34a', points: 12 },
      { name: 'pear', spriteKey: 'pear', radius: 46, glow: 'rgba(212, 225, 87, 0.85)', fallbackColor: '#d4e157', points: 10 },
      { name: 'strawberry', spriteKey: 'strawberry', radius: 42, glow: 'rgba(255, 47, 77, 0.85)', fallbackColor: '#ff2f4d', points: 12 }
    ];

    const HEART_ROWS = [
      '.XX.XX.',
      'XXXXXXX',
      'XXXXXXX',
      'XXXXXXX',
      '.XXXXX.',
      '..XXX..',
      '...X...'
    ];

    const BOMB_GRID_SIZE = 9;
    const BOMB_CIRCLE_MASK = (() => {
      const mask = [];
      const center = (BOMB_GRID_SIZE - 1) / 2;
      for (let r = 0; r < BOMB_GRID_SIZE; r++) {
        const row = [];
        for (let c = 0; c < BOMB_GRID_SIZE; c++) {
          const dx = c - center;
          const dy = r - center;
          row.push(Math.sqrt(dx * dx + dy * dy) <= center + 0.3);
        }
        mask.push(row);
      }
      return mask;
    })();

    let handLandmarker;
    let audioReady = false;
    let modelReady = false;
    let spritesReady = false;
    let currentPlayerName = '';
    let gameActive = false;

    let slicePlayer, lofiPlayer, explosionSynth, bombNoise, bombBoom, comboSynth, gameOverSynth;

    let score = 0;
    let lives = STARTING_LIVES;
    let comboCount = 0;
    let lastSliceTimestamp = 0;
    let comboFlash = { text: '', alpha: 0 };
    let activeObjects = [];
    let sliceEffects = [];
    let burstParticles = [];
    let trailPoints = [];
    let spawnTimerId = null;
    let leaderboard = [];

    function loadLeaderboard() {
      try {
        const raw = localStorage.getItem(LEADERBOARD_KEY);
        leaderboard = raw ? JSON.parse(raw) : [];
      } catch (error) {
        leaderboard = [];
      }
    }

    function saveLeaderboard() {
      try {
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
      } catch (error) {
        console.error('Could not save leaderboard:', error);
      }
    }

    function renderLeaderboard() {
      const sorted = [...leaderboard].sort((a, b) => b.bestScore - a.bestScore).slice(0, LEADERBOARD_MAX_ENTRIES);

      if (sorted.length === 0) {
        leaderboardList.innerHTML = '<div class="leaderboard-empty">No scores yet, be the first</div>';
        return;
      }

      leaderboardList.innerHTML = sorted.map((entry, i) => {
        const isCurrent = entry.name.toLowerCase() === currentPlayerName.toLowerCase();
        return `<div class="leaderboard-row${isCurrent ? ' current-player' : ''}">
          <span>${i + 1}. ${entry.name}</span>
          <span>${entry.bestScore}</span>
        </div>`;
      }).join('');
    }

    function updateLeaderboardEntry(name, finalScore) {
      const existing = leaderboard.find((e) => e.name.toLowerCase() === name.toLowerCase());
      let isNewHighScore = false;
      if (existing) {
        if (finalScore > existing.bestScore) {
          existing.bestScore = finalScore;
          isNewHighScore = true;
        }
      } else {
        leaderboard.push({ name, bestScore: finalScore });
        isNewHighScore = true;
      }
      saveLeaderboard();
      renderLeaderboard();
      return isNewHighScore;
    }

    resetLeaderboardButton.addEventListener('click', () => {
      const confirmed = confirm('Reset the entire leaderboard? This cannot be undone.');
      if (confirmed) {
        leaderboard = [];
        saveLeaderboard();
        renderLeaderboard();
      }
    });

    async function setupAudio() {
      await Tone.start();

      const masterGain = new Tone.Gain(0.85).toDestination();
      const reverb = new Tone.Reverb({ decay: 1.2, wet: 0.15 }).connect(masterGain);
      await reverb.generate();

      // real slice sound effect file, only ever plays when a fruit is actually sliced
      slicePlayer = new Tone.Player('assets/sounds/slice.mp3').connect(reverb);
      slicePlayer.volume.value = -4;

      // bomb explosion: three layers stacked together for a dramatic "whump"
      explosionSynth = new Tone.Synth({
        oscillator: { type: 'sawtooth' },
        envelope: { attack: 0.001, decay: 0.5, sustain: 0, release: 0.2 }
      }).connect(reverb);
      explosionSynth.volume.value = -6;

      bombNoise = new Tone.NoiseSynth({
        noise: { type: 'brown' },
        envelope: { attack: 0.001, decay: 0.35, sustain: 0 }
      }).connect(reverb);
      bombNoise.volume.value = -6;

      bombBoom = new Tone.MembraneSynth({
        pitchDecay: 0.1,
        octaves: 6,
        envelope: { attack: 0.001, decay: 0.5, sustain: 0 }
      }).connect(reverb);
      bombBoom.volume.value = -2;

      comboSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.3 }
      }).connect(reverb);
      comboSynth.volume.value = -8;

      gameOverSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.02, decay: 0.4, sustain: 0.2, release: 0.6 }
      }).connect(reverb);
      gameOverSynth.volume.value = -6;

      // real background music file, looped, kept quiet under gameplay sounds
      lofiPlayer = new Tone.Player('assets/sounds/folk-lofi.mp3').toDestination();
      lofiPlayer.volume.value = -20;

      // wait for both audio files to actually finish loading before trying to play them,
      // this is what was missing before and caused the whole startup sequence to crash
      await Tone.loaded();

      audioReady = true;
      startLofiLoop();
    }

    function startLofiLoop() {
      if (lofiPlayer) {
        lofiPlayer.loop = true;
        lofiPlayer.start();
      }
    }

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1,
        minHandDetectionConfidence: 0.4,
        minHandPresenceConfidence: 0.4,
        minTrackingConfidence: 0.4
      });

      modelReady = true;
      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Get ready...";
          renderLoop();
          startCountdown();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    async function beginSession() {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        return;
      }

      currentPlayerName = name;
      currentPlayerLabel.textContent = currentPlayerName;
      renderLeaderboard();

      nameGate.style.display = 'none';
      mainContent.style.display = 'block';

      if (!spritesReady) {
        status.textContent = "Loading sprites...";
        await preloadSprites();
        spritesReady = true;
      }

      if (!audioReady) {
        try {
          status.textContent = "Starting audio...";
          await setupAudio();
        } catch (error) {
          console.error("Audio setup failed, continuing without full audio:", error);
          status.textContent = "Some audio failed to load, continuing anyway...";
          // deliberately no "return" here, so a music/sound problem can never
          // prevent the camera and game itself from starting
        }
      }

      if (!modelReady) {
        setupHandLandmarker();
      } else {
        status.textContent = "Get ready...";
        startCountdown();
      }
    }

    enterButton.addEventListener('click', beginSession);
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') beginSession();
    });

    changePlayerButton.addEventListener('click', () => {
      stopGame();
      mainContent.style.display = 'none';
      nameGate.style.display = 'block';
      nameInput.value = '';
      nameInput.focus();
    });

    playAgainButton.addEventListener('click', () => {
      gameOverOverlay.classList.remove('visible');
      startCountdown();
    });

    function startCountdown() {
      resetGameState();
      let count = 3;
      status.textContent = "Get ready: " + count;
      const countdownInterval = setInterval(() => {
        count--;
        if (count > 0) {
          status.textContent = "Get ready: " + count;
        } else {
          clearInterval(countdownInterval);
          status.textContent = "Slice! Swipe through fruit, avoid bombs.";
          startGame();
        }
      }, 700);
    }

    function resetGameState() {
      score = 0;
      lives = STARTING_LIVES;
      comboCount = 0;
      activeObjects = [];
      sliceEffects = [];
      burstParticles = [];
      trailPoints = [];
    }

    function startGame() {
      gameActive = true;
      if (spawnTimerId) clearInterval(spawnTimerId);
      spawnTimerId = setInterval(spawnObject, SPAWN_INTERVAL_MS);
    }

    function stopGame() {
      gameActive = false;
      if (spawnTimerId) {
        clearInterval(spawnTimerId);
        spawnTimerId = null;
      }
    }

    function endGame() {
      gameActive = false;
      if (spawnTimerId) {
        clearInterval(spawnTimerId);
        spawnTimerId = null;
      }

      const isNewHighScore = updateLeaderboardEntry(currentPlayerName, score);
      finalScoreText.textContent = "Score: " + score;
      newHighScoreText.style.display = isNewHighScore ? 'block' : 'none';
      gameOverOverlay.classList.add('visible');

      if (gameOverSynth) {
        gameOverSynth.triggerAttackRelease(['C4', 'E4', 'G4'], '2n');
      }
    }

    function spawnObject() {
      if (!gameActive) return;

      const isBomb = Math.random() < BOMB_CHANCE;
      const startX = canvas.width * 0.15 + Math.random() * canvas.width * 0.7;
      const launchSpeed = mapRange(Math.random(), 0, 1, 19, 23);

      if (isBomb) {
        activeObjects.push({
          isBomb: true,
          x: startX,
          y: canvas.height + 60,
          vx: (Math.random() - 0.5) * 4,
          vy: -launchSpeed,
          radius: 42,
          rotation: 0
        });
      } else {
        const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
        activeObjects.push({
          isBomb: false,
          type,
          x: startX,
          y: canvas.height + 60,
          vx: (Math.random() - 0.5) * 4,
          vy: -launchSpeed,
          radius: type.radius,
          rotation: 0
        });
      }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
      return ((value - inMin) / (inMax - inMin)) * (outMax - outMin) + outMin;
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      const lengthSquared = dx * dx + dy * dy;
      let t = lengthSquared === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lengthSquared;
      t = Math.max(0, Math.min(1, t));
      const closestX = ax + t * dx;
      const closestY = ay + t * dy;
      return Math.hypot(px - closestX, py - closestY);
    }

    function spawnBurst(x, y, count, colorCore) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const speed = Math.random() * 5 + 2;
        burstParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          radius: Math.random() * 3 + 2,
          color: colorCore
        });
      }
    }

    function spawnSliceEffect(obj) {
      if (obj.isBomb) return;
      const color = obj.type.fallbackColor;
      for (let side = -1; side <= 1; side += 2) {
        sliceEffects.push({
          x: obj.x,
          y: obj.y,
          vx: side * (2 + Math.random() * 2),
          vy: obj.vy * 0.5 - 2,
          radius: obj.radius * 0.7,
          rotation: 0,
          rotationSpeed: side * 0.15,
          color,
          alpha: 1,
          side
        });
      }
    }

    function triggerComboFlash(text, color) {
      comboFlash = { text, alpha: 1, color };
    }

    function playSlashSound() {
      if (slicePlayer && slicePlayer.loaded) {
        slicePlayer.stop();
        slicePlayer.start();
      }
    }

    function playExplosionSound() {
      const now = Tone.now();
      if (explosionSynth) {
        explosionSynth.triggerAttack('A3', now);
        explosionSynth.frequency.exponentialRampToValueAtTime(35, now + 0.4);
        explosionSynth.triggerRelease(now + 0.4);
      }
      if (bombNoise) bombNoise.triggerAttackRelease('8n');
      if (bombBoom) bombBoom.triggerAttackRelease('C1', '4n');
    }

    function registerSlice(obj) {
      const now = performance.now();

      if (obj.isBomb) {
        lives--;
        console.log('LIFE LOST: sliced a bomb at', Math.round(obj.x), Math.round(obj.y), '| lives now:', lives);
        comboCount = 0;
        triggerComboFlash('BOMB!', 'rgba(255, 47, 77, 1)');
        spawnBurst(obj.x, obj.y, 30, 'rgba(255, 47, 77, ALPHA)');
        playExplosionSound();
      } else {
        if (now - lastSliceTimestamp < COMBO_TIMEOUT_MS) {
          comboCount++;
        } else {
          comboCount = 1;
        }
        lastSliceTimestamp = now;

        const bonus = comboCount >= 2 ? comboCount * 5 : 0;
        score += obj.type.points + bonus;

        if (comboCount >= 2) {
          triggerComboFlash('COMBO x' + comboCount, 'rgba(255, 230, 77, 1)');
          if (comboSynth) comboSynth.triggerAttackRelease(['C5', 'E5', 'G5'], '16n');
        }

        spawnBurst(obj.x, obj.y, 18, obj.type.glow.replace('0.85', 'ALPHA'));
        playSlashSound();
      }

      spawnSliceEffect(obj);
      updateLeaderboardEntry(currentPlayerName, score);

      if (lives <= 0) {
        endGame();
      }
    }

    function updateTrail(fingerX, fingerY) {
      trailPoints.push({ x: fingerX * canvas.width, y: fingerY * canvas.height });
      if (trailPoints.length > TRAIL_LENGTH) {
        trailPoints.shift();
      }
    }

    function checkSliceCollisions() {
      if (trailPoints.length < 2) return;
      const a = trailPoints[trailPoints.length - 2];
      const b = trailPoints[trailPoints.length - 1];

      activeObjects = activeObjects.filter((obj) => {
        const buffer = obj.isBomb ? BOMB_SLICE_BUFFER : FRUIT_SLICE_BUFFER;
        const distance = pointToSegmentDistance(obj.x, obj.y, a.x, a.y, b.x, b.y);
        if (distance < obj.radius + buffer) {
          registerSlice(obj);
          return false;
        }
        return true;
      });
    }

    function drawGlowDot(x, y, radius, color) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, color.glow);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color.core;
      ctx.beginPath();
      ctx.arc(x, y, radius / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawUnmirroredText(text, x, y, color, fontSize) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(-1, 1);
      ctx.fillStyle = color;
      ctx.font = fontSize + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawHeartIcon(x, y, size, filled) {
      const rows = HEART_ROWS.length;
      const cols = HEART_ROWS[0].length;
      const cell = size / cols;

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(-1, 1);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (HEART_ROWS[r][c] !== 'X') continue;
          ctx.fillStyle = filled ? '#ff2fb0' : 'rgba(255, 47, 176, 0.25)';
          ctx.fillRect(
            Math.floor(-size / 2 + c * cell),
            Math.floor(-size / 2 + r * cell),
            Math.ceil(cell) + 1,
            Math.ceil(cell) + 1
          );
        }
      }
      ctx.restore();
    }

    function drawLivesRow() {
      const iconSize = canvas.width * 0.035;
      const startX = canvas.width * 0.12;
      const y = canvas.height * 0.06;

      for (let i = 0; i < STARTING_LIVES; i++) {
        const iconX = startX + i * (iconSize + 10);
        drawHeartIcon(iconX, y, iconSize, i < lives);
      }
    }

    function drawBombIcon(obj) {
      const { x, y, radius } = obj;
      const boxSize = radius * 2.1;
      const cell = boxSize / BOMB_GRID_SIZE;
      const originX = -boxSize / 2;
      const originY = -boxSize / 2;
      const pulse = Math.sin(performance.now() / 150) * 0.15 + 0.85;

      ctx.save();
      ctx.translate(x, y);

      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 1.4);
      gradient.addColorStop(0, `rgba(255, 47, 77, ${0.5 * pulse})`);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.4, 0, Math.PI * 2);
      ctx.fill();

      for (let r = 0; r < BOMB_GRID_SIZE; r++) {
        for (let c = 0; c < BOMB_GRID_SIZE; c++) {
          if (!BOMB_CIRCLE_MASK[r][c]) continue;
          const distFromEdge = Math.min(r, c, BOMB_GRID_SIZE - 1 - r, BOMB_GRID_SIZE - 1 - c);
          ctx.fillStyle = distFromEdge === 0 ? `rgba(255, 47, 77, ${pulse})` : '#1a1a1a';
          ctx.fillRect(
            Math.floor(originX + c * cell),
            Math.floor(originY + r * cell),
            Math.ceil(cell) + 1,
            Math.ceil(cell) + 1
          );
        }
      }

      const fuseStartX = radius * 0.25;
      const fuseStartY = -radius * 0.85;
      ctx.strokeStyle = '#8a6d3b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(fuseStartX, fuseStartY);
      ctx.lineTo(fuseStartX + radius * 0.3, fuseStartY - radius * 0.35);
      ctx.stroke();

      const sparkX = fuseStartX + radius * 0.3;
      const sparkY = fuseStartY - radius * 0.35;
      ctx.fillStyle = `rgba(255, 230, 77, ${pulse})`;
      ctx.beginPath();
      ctx.arc(sparkX, sparkY, radius * 0.14 * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawFruitSprite(obj) {
      const { x, y, radius, type, rotation } = obj;
      const img = loadedImages[type.spriteKey];
      const size = radius * 2.3;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);

      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 1.3);
      gradient.addColorStop(0, type.glow);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.3, 0, Math.PI * 2);
      ctx.fill();

      if (img) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, -size / 2, -size / 2, size, size);
      } else {
        ctx.fillStyle = type.fallbackColor;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSliceEffects() {
      sliceEffects.forEach((s) => {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += GRAVITY;
        s.rotation += s.rotationSpeed;
        s.alpha -= 0.02;

        ctx.save();
        ctx.globalAlpha = Math.max(0, s.alpha);
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(0, 0, s.radius, s.side > 0 ? -Math.PI / 2 : Math.PI / 2, s.side > 0 ? Math.PI / 2 : Math.PI * 1.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
      sliceEffects = sliceEffects.filter((s) => s.alpha > 0);
    }

    function drawBurstParticles() {
      burstParticles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.025;
        ctx.fillStyle = p.color.replace('ALPHA', Math.max(0, p.alpha).toFixed(2));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      });
      burstParticles = burstParticles.filter((p) => p.alpha > 0);
    }

    function drawTrail() {
      for (let i = 1; i < trailPoints.length; i++) {
        const a = trailPoints[i - 1];
        const b = trailPoints[i];
        const ageFactor = i / trailPoints.length;

        ctx.strokeStyle = `rgba(127, 255, 212, ${ageFactor * 0.8})`;
        ctx.lineWidth = ageFactor * 6 + 1;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function drawHud() {
      drawUnmirroredText('SCORE ' + score, canvas.width - canvas.width * 0.15, canvas.height * 0.06, 'rgba(127, 255, 212, 0.9)', canvas.width * 0.02);
      drawLivesRow();

      if (comboFlash.alpha > 0) {
        ctx.globalAlpha = comboFlash.alpha;
        drawUnmirroredText(comboFlash.text, canvas.width / 2, canvas.height * 0.15, comboFlash.color, canvas.width * 0.032);
        ctx.globalAlpha = 1;
        comboFlash.alpha -= 0.02;
      }
    }

    function updatePhysics() {
      activeObjects.forEach((obj) => {
        obj.x += obj.vx;
        obj.y += obj.vy;
        obj.vy += GRAVITY;
        obj.rotation += 0.03;
      });

      let missedCount = 0;
      activeObjects = activeObjects.filter((obj) => {
        const fellPastBottom = obj.vy > 0 && (obj.y - obj.radius > canvas.height);
        if (fellPastBottom) {
          if (!obj.isBomb) {
            missedCount++;
            console.log('LIFE LOST: missed a fruit falling off screen, type:', obj.type.name);
          }
          return false;
        }
        return true;
      });

      if (missedCount > 0) {
        lives -= missedCount;
        console.log('Lives now:', lives);
        comboCount = 0;
        if (lives <= 0) {
          endGame();
        }
      }
    }

    function renderLoop() {
      const now = performance.now();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (handLandmarker && video.readyState >= 2) {
        try {
          const results = handLandmarker.detectForVideo(video, now);
          if (results.landmarks && results.landmarks.length > 0) {
            const indexTip = results.landmarks[0][8];
            updateTrail(indexTip.x, indexTip.y);
            drawGlowDot(indexTip.x * canvas.width, indexTip.y * canvas.height, 20, {
              glow: 'rgba(127, 255, 212, 0.8)',
              core: '#7fffd4'
            });
            if (gameActive) checkSliceCollisions();
          }
        } catch (error) {
          console.error("Detection error:", error);
        }
      }

      if (gameActive) {
        updatePhysics();
      }

      activeObjects.forEach((obj) => {
        if (obj.isBomb) {
          drawBombIcon(obj);
        } else {
          drawFruitSprite(obj);
        }
      });

      drawTrail();
      drawSliceEffects();
      drawBurstParticles();
      drawHud();

      requestAnimationFrame(renderLoop);
    }

    loadLeaderboard();
    renderLeaderboard();
  </script>

</body>
