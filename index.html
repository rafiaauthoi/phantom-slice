<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gesture Slice Game</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <style>
    body {
      background-color: #050505;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
      margin: 0;
    }

    h1 {
      color: #ff2fb0;
      text-shadow: 0 0 12px #ff2fb0;
      letter-spacing: 2px;
    }

    #name-gate {
      max-width: 400px;
      margin: 40px auto 0;
      padding: 24px;
      border: 2px solid #ff2fb0;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255, 47, 176, 0.3);
    }

    #name-gate p {
      color: #7fffd4;
      font-size: 14px;
      margin-bottom: 16px;
    }

    #nameInput {
      width: 80%;
      background-color: #0a0a0a;
      border: 2px solid #7fffd4;
      color: #eaeaea;
      font-family: monospace;
      font-size: 16px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 16px;
    }

    #enterButton, #changePlayerButton, #playAgainButton {
      background-color: #ff2fb0;
      color: #0a0a0a;
      border: none;
      padding: 12px 24px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
    }

    #enterButton:hover, #changePlayerButton:hover, #playAgainButton:hover {
      background-color: #ff5fc4;
    }

    #main-content {
      display: none;
    }

    #player-bar {
      margin-top: 12px;
      font-size: 14px;
      color: #7fffd4;
    }

    #changePlayerButton {
      margin-top: 10px;
      padding: 6px 16px;
      font-size: 12px;
    }

    #main-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    #video-wrapper {
      position: relative;
      width: 65vw;
      max-width: 950px;
      aspect-ratio: 4 / 3;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 47, 176, 0.4);
      background-color: #000;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      opacity: 0.55;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(5, 5, 5, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: scaleX(-1);
    }

    #game-over-overlay.visible {
      display: flex;
    }

    #game-over-overlay h2 {
      color: #ff2fb0;
      text-shadow: 0 0 14px #ff2fb0;
      font-size: 28px;
      margin-bottom: 6px;
    }

    #game-over-overlay p {
      color: #7fffd4;
      font-size: 16px;
      margin: 4px 0;
    }

    #leaderboard {
      width: 220px;
      border: 2px solid #7fffd4;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(127, 255, 212, 0.3);
      text-align: left;
    }

    #leaderboard h2 {
      color: #7fffd4;
      font-size: 14px;
      letter-spacing: 1px;
      margin: 0 0 12px 0;
      text-align: center;
    }

    #resetLeaderboardButton {
      display: block;
      margin: 14px auto 0;
      background-color: transparent;
      color: #ff2fb0;
      border: 1px solid #ff2fb0;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }

    #resetLeaderboardButton:hover {
      background-color: rgba(255, 47, 176, 0.15);
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(127, 255, 212, 0.15);
    }

    .leaderboard-row.current-player {
      color: #ffe64d;
      font-weight: bold;
    }

    .leaderboard-empty {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>GESTURE SLICE</h1>

  <div id="name-gate">
    <p>Enter your name to start playing</p>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="16" />
    <button id="enterButton">Let's Play</button>
  </div>

  <div id="main-content">
    <div id="player-bar">
      Playing as: <span id="currentPlayerLabel">-</span>
      <br />
      <button id="changePlayerButton">Change Player</button>
    </div>

    <div id="main-row">
      <div id="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay" width="1280" height="960"></canvas>
        <div id="game-over-overlay">
          <h2>GAME OVER</h2>
          <p id="finalScoreText">Score: 0</p>
          <p id="newHighScoreText" style="color: #ffe64d; display: none;">NEW HIGH SCORE</p>
          <button id="playAgainButton" style="margin-top: 16px;">Play Again</button>
        </div>
      </div>

      <div id="leaderboard">
        <h2>TOP SCORES</h2>
        <div id="leaderboard-list"></div>
        <button id="resetLeaderboardButton">Reset Leaderboard</button>
      </div>
    </div>

    <p id="status">Loading tracking model...</p>
  </div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const nameGate = document.getElementById('name-gate');
    const mainContent = document.getElementById('main-content');
    const nameInput = document.getElementById('nameInput');
    const enterButton = document.getElementById('enterButton');
    const changePlayerButton = document.getElementById('changePlayerButton');
    const currentPlayerLabel = document.getElementById('currentPlayerLabel');
    const leaderboardList = document.getElementById('leaderboard-list');
    const resetLeaderboardButton = document.getElementById('resetLeaderboardButton');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const finalScoreText = document.getElementById('finalScoreText');
    const newHighScoreText = document.getElementById('newHighScoreText');
    const playAgainButton = document.getElementById('playAgainButton');

    const LEADERBOARD_KEY = 'gesture-slice-game-leaderboard';
    const LEADERBOARD_MAX_ENTRIES = 8;
    const GRAVITY = 0.35;
    const STARTING_LIVES = 3;
    const SPAWN_INTERVAL_MS = 1050;
    const BOMB_CHANCE = 0.18;
    const COMBO_TIMEOUT_MS = 500;
    const TRAIL_LENGTH = 18;

    const FRUIT_TYPES = [
      { name: 'apple', radius: 46, core: '#ff2f4d', glow: 'rgba(255, 47, 77, 0.85)', accent: '#3ddc84', points: 10 },
      { name: 'orange', radius: 50, core: '#ff9d2f', glow: 'rgba(255, 157, 47, 0.85)', accent: '#ffe64d', points: 10 },
      { name: 'watermelon', radius: 60, core: '#3ddc84', glow: 'rgba(61, 220, 132, 0.85)', accent: '#ff2f4d', points: 15 },
      { name: 'kiwi', radius: 42, core: '#c6ff2f', glow: 'rgba(198, 255, 47, 0.85)', accent: '#7fffd4', points: 10 }
    ];

    let handLandmarker;
    let audioReady = false;
    let modelReady = false;
    let currentPlayerName = '';
    let gameActive = false;

    let sliceSynth, bombSynth, bombBoom, comboSynth, gameOverSynth;

    let score = 0;
    let lives = STARTING_LIVES;
    let comboCount = 0;
    let lastSliceTimestamp = 0;
    let comboFlash = { text: '', alpha: 0 };
    let activeObjects = [];
    let sliceEffects = [];
    let burstParticles = [];
    let trailPoints = [];
    let spawnTimerId = null;
    let leaderboard = [];

    function loadLeaderboard() {
      try {
        const raw = localStorage.getItem(LEADERBOARD_KEY);
        leaderboard = raw ? JSON.parse(raw) : [];
      } catch (error) {
        leaderboard = [];
      }
    }

    function saveLeaderboard() {
      try {
        localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
      } catch (error) {
        console.error('Could not save leaderboard:', error);
      }
    }

    function renderLeaderboard() {
      const sorted = [...leaderboard].sort((a, b) => b.bestScore - a.bestScore).slice(0, LEADERBOARD_MAX_ENTRIES);

      if (sorted.length === 0) {
        leaderboardList.innerHTML = '<div class="leaderboard-empty">No scores yet, be the first</div>';
        return;
      }

      leaderboardList.innerHTML = sorted.map((entry, i) => {
        const isCurrent = entry.name.toLowerCase() === currentPlayerName.toLowerCase();
        return `<div class="leaderboard-row${isCurrent ? ' current-player' : ''}">
          <span>${i + 1}. ${entry.name}</span>
          <span>${entry.bestScore}</span>
        </div>`;
      }).join('');
    }

    function updateLeaderboardEntry(name, finalScore) {
      const existing = leaderboard.find((e) => e.name.toLowerCase() === name.toLowerCase());
      let isNewHighScore = false;
      if (existing) {
        if (finalScore > existing.bestScore) {
          existing.bestScore = finalScore;
          isNewHighScore = true;
        }
      } else {
        leaderboard.push({ name, bestScore: finalScore });
        isNewHighScore = true;
      }
      saveLeaderboard();
      renderLeaderboard();
      return isNewHighScore;
    }

    resetLeaderboardButton.addEventListener('click', () => {
      const confirmed = confirm('Reset the entire leaderboard? This cannot be undone.');
      if (confirmed) {
        leaderboard = [];
        saveLeaderboard();
        renderLeaderboard();
      }
    });

    async function setupAudio() {
      await Tone.start();

      const masterGain = new Tone.Gain(0.85).toDestination();
      const reverb = new Tone.Reverb({ decay: 1.2, wet: 0.15 }).connect(masterGain);
      await reverb.generate();

      sliceSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'triangle' },
        envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 }
      }).connect(reverb);
      sliceSynth.volume.value = -8;

      bombSynth = new Tone.NoiseSynth({
        noise: { type: 'brown' },
        envelope: { attack: 0.001, decay: 0.3, sustain: 0 }
      }).connect(reverb);
      bombSynth.volume.value = -4;

      bombBoom = new Tone.MembraneSynth({
        pitchDecay: 0.08,
        octaves: 5,
        envelope: { attack: 0.001, decay: 0.4, sustain: 0 }
      }).connect(reverb);
      bombBoom.volume.value = -2;

      comboSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.3 }
      }).connect(reverb);
      comboSynth.volume.value = -8;

      gameOverSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 0.02, decay: 0.4, sustain: 0.2, release: 0.6 }
      }).connect(reverb);
      gameOverSynth.volume.value = -6;

      audioReady = true;
    }

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      modelReady = true;
      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Get ready...";
          renderLoop();
          startCountdown();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    async function beginSession() {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        return;
      }

      currentPlayerName = name;
      currentPlayerLabel.textContent = currentPlayerName;
      renderLeaderboard();

      nameGate.style.display = 'none';
      mainContent.style.display = 'block';

      if (!audioReady) {
        try {
          status.textContent = "Starting audio...";
          await setupAudio();
        } catch (error) {
          console.error("Audio setup failed:", error);
          status.textContent = "Audio setup failed: " + error.message;
          return;
        }
      }

      if (!modelReady) {
        setupHandLandmarker();
      } else {
        status.textContent = "Get ready...";
        startCountdown();
      }
    }

    enterButton.addEventListener('click', beginSession);
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') beginSession();
    });

    changePlayerButton.addEventListener('click', () => {
      stopGame();
      mainContent.style.display = 'none';
      nameGate.style.display = 'block';
      nameInput.value = '';
      nameInput.focus();
    });

    playAgainButton.addEventListener('click', () => {
      gameOverOverlay.classList.remove('visible');
      startCountdown();
    });

    function startCountdown() {
      resetGameState();
      let count = 3;
      status.textContent = "Get ready: " + count;
      const countdownInterval = setInterval(() => {
        count--;
        if (count > 0) {
          status.textContent = "Get ready: " + count;
        } else {
          clearInterval(countdownInterval);
          status.textContent = "Slice! Swipe through fruit, avoid bombs.";
          startGame();
        }
      }, 700);
    }

    function resetGameState() {
      score = 0;
      lives = STARTING_LIVES;
      comboCount = 0;
      activeObjects = [];
      sliceEffects = [];
      burstParticles = [];
      trailPoints = [];
    }

    function startGame() {
      gameActive = true;
      if (spawnTimerId) clearInterval(spawnTimerId);
      spawnTimerId = setInterval(spawnObject, SPAWN_INTERVAL_MS);
    }

    function stopGame() {
      gameActive = false;
      if (spawnTimerId) {
        clearInterval(spawnTimerId);
        spawnTimerId = null;
      }
    }

    function endGame() {
      gameActive = false;
      if (spawnTimerId) {
        clearInterval(spawnTimerId);
        spawnTimerId = null;
      }

      const isNewHighScore = updateLeaderboardEntry(currentPlayerName, score);
      finalScoreText.textContent = "Score: " + score;
      newHighScoreText.style.display = isNewHighScore ? 'block' : 'none';
      gameOverOverlay.classList.add('visible');

      if (gameOverSynth) {
        gameOverSynth.triggerAttackRelease(['C4', 'E4', 'G4'], '2n');
      }
    }

    function spawnObject() {
      if (!gameActive) return;

      const isBomb = Math.random() < BOMB_CHANCE;
      const startX = canvas.width * 0.15 + Math.random() * canvas.width * 0.7;
      const launchSpeed = mapRange(Math.random(), 0, 1, 13, 17);

      if (isBomb) {
        activeObjects.push({
          isBomb: true,
          x: startX,
          y: canvas.height + 60,
          vx: (Math.random() - 0.5) * 4,
          vy: -launchSpeed,
          radius: 42,
          rotation: 0
        });
      } else {
        const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
        activeObjects.push({
          isBomb: false,
          type,
          x: startX,
          y: canvas.height + 60,
          vx: (Math.random() - 0.5) * 4,
          vy: -launchSpeed,
          radius: type.radius,
          rotation: 0
        });
      }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
      return ((value - inMin) / (inMax - inMin)) * (outMax - outMin) + outMin;
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      const lengthSquared = dx * dx + dy * dy;
      let t = lengthSquared === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lengthSquared;
      t = Math.max(0, Math.min(1, t));
      const closestX = ax + t * dx;
      const closestY = ay + t * dy;
      return Math.hypot(px - closestX, py - closestY);
    }

    function spawnBurst(x, y, count, colorCore) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const speed = Math.random() * 5 + 2;
        burstParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          radius: Math.random() * 3 + 2,
          color: colorCore
        });
      }
    }

    function spawnSliceEffect(obj) {
      const color = obj.isBomb ? '#ff2f4d' : obj.type.core;
      for (let side = -1; side <= 1; side += 2) {
        sliceEffects.push({
          x: obj.x,
          y: obj.y,
          vx: side * (2 + Math.random() * 2),
          vy: obj.vy * 0.5 - 2,
          radius: obj.radius * 0.7,
          rotation: 0,
          rotationSpeed: side * 0.15,
          color,
          alpha: 1,
          side
        });
      }
    }

    function triggerComboFlash(text, color) {
      comboFlash = { text, alpha: 1, color };
    }

    function registerSlice(obj) {
      const now = performance.now();

      if (obj.isBomb) {
        lives--;
        comboCount = 0;
        triggerComboFlash('BOMB!', 'rgba(255, 47, 77, 1)');
        spawnBurst(obj.x, obj.y, 30, 'rgba(255, 47, 77, ALPHA)');
        if (bombSynth) bombSynth.triggerAttackRelease('4n');
        if (bombBoom) bombBoom.triggerAttackRelease('C1', '4n');
      } else {
        if (now - lastSliceTimestamp < COMBO_TIMEOUT_MS) {
          comboCount++;
        } else {
          comboCount = 1;
        }
        lastSliceTimestamp = now;

        const bonus = comboCount >= 2 ? comboCount * 5 : 0;
        score += obj.type.points + bonus;

        if (comboCount >= 2) {
          triggerComboFlash('COMBO x' + comboCount, 'rgba(255, 230, 77, 1)');
          if (comboSynth) comboSynth.triggerAttackRelease(['C5', 'E5', 'G5'], '16n');
        }

        spawnBurst(obj.x, obj.y, 18, obj.type.glow.replace('0.85', 'ALPHA'));
        if (sliceSynth) {
          const notes = ['C5', 'D5', 'E5', 'G5', 'A5'];
          sliceSynth.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '16n');
        }
      }

      spawnSliceEffect(obj);
      updateLeaderboardEntry(currentPlayerName, score);

      if (lives <= 0) {
        endGame();
      }
    }

    function updateTrail(fingerX, fingerY) {
      trailPoints.push({ x: fingerX * canvas.width, y: fingerY * canvas.height });
      if (trailPoints.length > TRAIL_LENGTH) {
        trailPoints.shift();
      }
    }

    function checkSliceCollisions() {
      if (trailPoints.length < 2) return;
      const a = trailPoints[trailPoints.length - 2];
      const b = trailPoints[trailPoints.length - 1];

      activeObjects = activeObjects.filter((obj) => {
        const distance = pointToSegmentDistance(obj.x, obj.y, a.x, a.y, b.x, b.y);
        if (distance < obj.radius + 12) {
          registerSlice(obj);
          return false;
        }
        return true;
      });
    }

    function drawGlowDot(x, y, radius, color) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, color.glow);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color.core;
      ctx.beginPath();
      ctx.arc(x, y, radius / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawUnmirroredText(text, x, y, color, fontSize, align) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(-1, 1);
      ctx.fillStyle = color;
      ctx.font = fontSize + 'px monospace';
      ctx.textAlign = align || 'center';
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawFruit(obj) {
      const { x, y, radius, type } = obj;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(obj.rotation);

      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
      gradient.addColorStop(0, type.glow);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = type.core;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.75, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = type.accent;
      ctx.beginPath();
      ctx.arc(radius * 0.15, -radius * 0.15, radius * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawBomb(obj) {
      const { x, y, radius } = obj;
      const pulse = Math.sin(performance.now() / 150) * 0.15 + 0.85;

      ctx.save();
      ctx.translate(x, y);

      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 1.4);
      gradient.addColorStop(0, `rgba(255, 47, 77, ${0.5 * pulse})`);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 47, 77, ${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.9, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    function drawSliceEffects() {
      sliceEffects.forEach((s) => {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += GRAVITY;
        s.rotation += s.rotationSpeed;
        s.alpha -= 0.02;

        ctx.save();
        ctx.globalAlpha = Math.max(0, s.alpha);
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(0, 0, s.radius, s.side > 0 ? -Math.PI / 2 : Math.PI / 2, s.side > 0 ? Math.PI / 2 : Math.PI * 1.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
      sliceEffects = sliceEffects.filter((s) => s.alpha > 0);
    }

    function drawBurstParticles() {
      burstParticles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.025;
        ctx.fillStyle = p.color.replace('ALPHA', Math.max(0, p.alpha).toFixed(2));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      });
      burstParticles = burstParticles.filter((p) => p.alpha > 0);
    }

    function drawTrail() {
      for (let i = 1; i < trailPoints.length; i++) {
        const a = trailPoints[i - 1];
        const b = trailPoints[i];
        const ageFactor = i / trailPoints.length;

        ctx.strokeStyle = `rgba(127, 255, 212, ${ageFactor * 0.8})`;
        ctx.lineWidth = ageFactor * 6 + 1;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function drawHud() {
      drawUnmirroredText('SCORE ' + score, canvas.width - canvas.width * 0.03, canvas.height * 0.06, 'rgba(127, 255, 212, 0.9)', canvas.width * 0.022, 'right');

      let livesText = '';
      for (let i = 0; i < STARTING_LIVES; i++) {
        livesText += i < lives ? '<3 ' : '.. ';
      }
      drawUnmirroredText(livesText, canvas.width * 0.03, canvas.height * 0.06, 'rgba(255, 47, 176, 0.9)', canvas.width * 0.022, 'left');

      if (comboFlash.alpha > 0) {
        ctx.globalAlpha = comboFlash.alpha;
        drawUnmirroredText(comboFlash.text, canvas.width / 2, canvas.height * 0.15, comboFlash.color, canvas.width * 0.032, 'center');
        ctx.globalAlpha = 1;
        comboFlash.alpha -= 0.02;
      }
    }

    function updatePhysics() {
      activeObjects.forEach((obj) => {
        obj.x += obj.vx;
        obj.y += obj.vy;
        obj.vy += GRAVITY;
        obj.rotation += 0.03;
      });

      const missedFruits = activeObjects.filter((obj) => obj.y - obj.radius > canvas.height && !obj.isBomb);
      if (missedFruits.length > 0) {
        lives -= missedFruits.length;
        comboCount = 0;
        if (lives <= 0) {
          activeObjects = activeObjects.filter((obj) => obj.y - obj.radius <= canvas.height || obj.isBomb);
          endGame();
        }
      }

      activeObjects = activeObjects.filter((obj) => obj.y - obj.radius <= canvas.height + 5);
    }

    function renderLoop() {
      const now = performance.now();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (handLandmarker && video.readyState >= 2) {
        try {
          const results = handLandmarker.detectForVideo(video, now);
          if (results.landmarks && results.landmarks.length > 0) {
            const indexTip = results.landmarks[0][8];
            updateTrail(indexTip.x, indexTip.y);
            drawGlowDot(indexTip.x * canvas.width, indexTip.y * canvas.height, 20, {
              glow: 'rgba(127, 255, 212, 0.8)',
              core: '#7fffd4'
            });
            if (gameActive) checkSliceCollisions();
          }
        } catch (error) {
          console.error("Detection error:", error);
        }
      }

      if (gameActive) {
        updatePhysics();
      }

      activeObjects.forEach((obj) => {
        if (obj.isBomb) {
          drawBomb(obj);
        } else {
          drawFruit(obj);
        }
      });

      drawTrail();
      drawSliceEffects();
      drawBurstParticles();
      drawHud();

      requestAnimationFrame(renderLoop);
    }

    loadLeaderboard();
    renderLeaderboard();
  </script>

</body>
</html>
